<svg width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-label="Example git-diff-html output (mockup)">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4f6f8"/><stop offset="1" stop-color="#e7eaee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <clipPath id="round"><rect x="20" y="20" width="920" height="560" rx="14"/></clipPath>
  </defs>

  <rect width="960" height="600" fill="#eef1f5"/>

  <g filter="url(#shadow)">
    <rect x="20" y="20" width="920" height="560" rx="14" fill="#ffffff"/>
  </g>

  <g clip-path="url(#round)">
    <!-- browser chrome -->
    <rect x="20" y="20" width="920" height="44" fill="url(#chrome)"/>
    <circle cx="46" cy="42" r="6" fill="#ff5f57"/>
    <circle cx="66" cy="42" r="6" fill="#febc2e"/>
    <circle cx="86" cy="42" r="6" fill="#28c840"/>
    <rect x="120" y="30" width="700" height="24" rx="12" fill="#ffffff" stroke="#dfe3e8"/>
    <text x="138" y="46" font-size="12" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace">file:///~/.local/share/git-diff-html/diff.html</text>

    <!-- left file tree sidebar -->
    <rect x="20" y="64" width="210" height="516" fill="#fbfcfd"/>
    <line x1="230" y1="64" x2="230" y2="580" stroke="#e7eaee"/>
    <text x="40" y="96" font-size="12" font-weight="700" fill="#475569" letter-spacing="0.5">CHANGED FILES</text>
    <text x="40" y="126" font-size="13" fill="#64748b">▾ apps/</text>
    <text x="56" y="150" font-size="13" fill="#64748b">▾ web/</text>
    <text x="72" y="174" font-size="13" font-weight="700" fill="#2b8def">App.tsx</text>
    <text x="72" y="198" font-size="13" fill="#334155">router.ts</text>
    <text x="40" y="226" font-size="13" fill="#64748b">▾ src/</text>
    <text x="56" y="250" font-size="13" fill="#334155">utils.py</text>
    <text x="56" y="274" font-size="13" fill="#334155">README.md</text>

    <!-- worktree banner (top-center over diff column) -->
    <rect x="470" y="78" width="220" height="30" rx="15" fill="#2b8def"/>
    <text x="580" y="98" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">⎇ feature/login-flow</text>

    <!-- file summary header -->
    <rect x="250" y="130" width="670" height="36" rx="8" fill="#f4f8ff" stroke="#dbe7fb"/>
    <text x="268" y="153" font-size="13" font-weight="700" fill="#1f2d3d">apps/web/App.tsx</text>
    <text x="780" y="153" font-size="12" font-weight="700" fill="#16a34a">+12</text>
    <text x="816" y="153" font-size="12" font-weight="700" fill="#dc2626">−4</text>
    <rect x="846" y="138" width="58" height="20" rx="10" fill="#eef2f7" stroke="#d6dde6"/>
    <text x="875" y="152" font-size="11" fill="#475569" text-anchor="middle">Full file</text>

    <!-- diff body -->
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12.5">
      <!-- context -->
      <rect x="250" y="174" width="670" height="22" fill="#ffffff"/>
      <text x="266" y="189" fill="#cbd5e1">14</text><text x="320" y="189" fill="#475569">  function Login({'{'} onSubmit {'}'}) {'{'}</text>

      <!-- removed -->
      <rect x="250" y="196" width="670" height="22" fill="#ffe9ec"/>
      <rect x="250" y="196" width="6" height="22" fill="#f43f5e"/>
      <text x="266" y="211" fill="#e6a3ad">15</text><text x="314" y="211" fill="#b91c1c">−  const [u, setU] = useState("");</text>

      <!-- added -->
      <rect x="250" y="218" width="670" height="22" fill="#e6f7ed"/>
      <rect x="250" y="218" width="6" height="22" fill="#10b981"/>
      <text x="290" y="233" fill="#86c8a3">15</text><text x="314" y="233" fill="#15803d">+  const [email, setEmail] = useState("");</text>

      <!-- added -->
      <rect x="250" y="240" width="670" height="22" fill="#e6f7ed"/>
      <rect x="250" y="240" width="6" height="22" fill="#10b981"/>
      <text x="290" y="255" fill="#86c8a3">16</text><text x="314" y="255" fill="#15803d">+  const [pw, setPw] = useState("");</text>

      <!-- context -->
      <rect x="250" y="262" width="670" height="22" fill="#ffffff"/>
      <text x="266" y="277" fill="#cbd5e1">17</text><text x="320" y="277" fill="#475569">  const valid = email.includes("@");</text>

      <!-- removed -->
      <rect x="250" y="284" width="670" height="22" fill="#ffe9ec"/>
      <rect x="250" y="284" width="6" height="22" fill="#f43f5e"/>
      <text x="266" y="299" fill="#e6a3ad">18</text><text x="314" y="299" fill="#b91c1c">−  return &lt;form onSubmit={'{'}onSubmit{'}'}&gt;</text>

      <!-- added -->
      <rect x="250" y="306" width="670" height="22" fill="#e6f7ed"/>
      <rect x="250" y="306" width="6" height="22" fill="#10b981"/>
      <text x="290" y="321" fill="#86c8a3">18</text><text x="314" y="321" fill="#15803d">+  return &lt;form onSubmit={'{'}handleSubmit{'}'}&gt;</text>

      <!-- context lines -->
      <rect x="250" y="328" width="670" height="22" fill="#ffffff"/>
      <text x="266" y="343" fill="#cbd5e1">19</text><text x="320" y="343" fill="#475569">    &lt;input value={'{'}email{'}'} /&gt;</text>
      <rect x="250" y="350" width="670" height="22" fill="#ffffff"/>
      <text x="266" y="365" fill="#cbd5e1">20</text><text x="320" y="365" fill="#475569">    &lt;input type="password" /&gt;</text>
    </g>

    <!-- second file header (sticky look) -->
    <rect x="250" y="384" width="670" height="36" rx="8" fill="#f4f8ff" stroke="#dbe7fb"/>
    <text x="268" y="407" font-size="13" font-weight="700" fill="#1f2d3d" font-family="ui-sans-serif">apps/web/router.ts</text>
    <text x="784" y="407" font-size="12" font-weight="700" fill="#16a34a">+5</text>
    <text x="816" y="407" font-size="12" font-weight="700" fill="#dc2626">−1</text>

    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12.5">
      <rect x="250" y="428" width="670" height="22" fill="#e6f7ed"/>
      <rect x="250" y="428" width="6" height="22" fill="#10b981"/>
      <text x="290" y="443" fill="#86c8a3">7</text><text x="314" y="443" fill="#15803d">+  {'{'} path: "/login", component: Login {'}'},</text>
      <rect x="250" y="450" width="670" height="22" fill="#ffffff"/>
      <text x="266" y="465" fill="#cbd5e1">8</text><text x="320" y="465" fill="#475569">  {'{'} path: "/", component: Home {'}'},</text>
    </g>
  </g>

  <text x="480" y="596" font-size="11" fill="#94a3b8" text-anchor="middle">illustrative mockup — actual output renders live with diff2html</text>
</svg>
