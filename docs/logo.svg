<svg width="640" height="240" viewBox="0 0 640 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="git-diff-html">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b2b4b"/>
      <stop offset="1" stop-color="#0d1626"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#54a3ff"/>
      <stop offset="1" stop-color="#2b8def"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="640" height="240" rx="28" fill="url(#bg)"/>

  <!-- side-by-side diff window -->
  <g filter="url(#soft)">
    <rect x="40" y="44" width="248" height="152" rx="16" fill="#0f1b30" stroke="#2b3b5c" stroke-width="1.5"/>
    <!-- title bar -->
    <rect x="40" y="44" width="248" height="30" rx="16" fill="url(#accent)"/>
    <rect x="40" y="60" width="248" height="14" fill="url(#accent)"/>
    <circle cx="60" cy="59" r="4" fill="#ffffff" fill-opacity="0.85"/>
    <circle cx="76" cy="59" r="4" fill="#ffffff" fill-opacity="0.55"/>
    <circle cx="92" cy="59" r="4" fill="#ffffff" fill-opacity="0.35"/>
    <!-- center divider -->
    <line x1="164" y1="74" x2="164" y2="196" stroke="#2b3b5c" stroke-width="1.5"/>

    <!-- left pane (removed) -->
    <rect x="56" y="90"  width="92" height="9" rx="4.5" fill="#36476a"/>
    <rect x="56" y="108" width="74" height="9" rx="4.5" fill="#ff6b6b" fill-opacity="0.85"/>
    <rect x="56" y="126" width="84" height="9" rx="4.5" fill="#ff6b6b" fill-opacity="0.85"/>
    <rect x="56" y="144" width="60" height="9" rx="4.5" fill="#36476a"/>
    <rect x="56" y="162" width="80" height="9" rx="4.5" fill="#36476a"/>

    <!-- right pane (added) -->
    <rect x="180" y="90"  width="92" height="9" rx="4.5" fill="#36476a"/>
    <rect x="180" y="108" width="70" height="9" rx="4.5" fill="#3fb950"/>
    <rect x="180" y="126" width="88" height="9" rx="4.5" fill="#3fb950"/>
    <rect x="180" y="144" width="64" height="9" rx="4.5" fill="#3fb950"/>
    <rect x="180" y="162" width="80" height="9" rx="4.5" fill="#36476a"/>
  </g>

  <!-- wordmark -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="328" y="112" font-size="40" font-weight="700" fill="#e8eefc">git<tspan fill="#2b8def">-</tspan>diff</text>
    <text x="328" y="160" font-size="40" font-weight="700" fill="#2b8def">html</text>
    <text x="330" y="192" font-size="16" font-weight="500" fill="#7d8db3" font-family="ui-sans-serif, system-ui, sans-serif">side-by-side diffs in your browser</text>
  </g>
</svg>
